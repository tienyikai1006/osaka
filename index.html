<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>田鎮雞的日本之旅🇯🇵</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;600;700;900&family=Nunito:wght@700;800;900&display=swap" rel="stylesheet">
<style>
:root {
  --tom-blue: #2d6fa8;
  --tom-blue-dark: #1a4a75;
  --tom-blue-light: #e8f2fb;
  --jerry-orange: #e8840a;
  --jerry-warm: #fef3e2;
  --jerry-amber: #f5c842;
  --cheese-yellow: #f7d842;
  --red-accent: #d94f3d;
  --green-ok: #3aad6e;
  --bg: #fdf8f2;
  --surface: #ffffff;
  --surface2: #faf6f0;
  --border: #ecddd0;
  --text: #2a1f15;
  --text2: #7a5f4a;
  --text3: #b09080;
  --shadow: 0 2px 8px rgba(42,31,21,0.08), 0 1px 3px rgba(42,31,21,0.05);
  --shadow-md: 0 4px 20px rgba(42,31,21,0.12), 0 2px 8px rgba(42,31,21,0.08);
  --radius: 16px;
}

* { margin:0; padding:0; box-sizing:border-box; }
body { background:var(--bg); color:var(--text); font-family:'Noto Sans TC',sans-serif; min-height:100vh; }

/* ── HEADER ── */
.header {
  background: linear-gradient(160deg, #1a4a75 0%, #2d6fa8 45%, #3d8fc8 100%);
  padding: 0 0 0;
  text-align: center;
  position: relative;
  overflow: hidden;
}
.header-pattern {
  position: absolute; inset: 0;
  background-image: repeating-linear-gradient(
    -45deg, transparent, transparent 18px,
    rgba(255,255,255,0.03) 18px, rgba(255,255,255,0.03) 36px
  );
  pointer-events: none;
}
/* cheese holes decoration */
.cheese-holes {
  position: absolute; bottom: 0; left: 0; right: 0; height: 8px;
  background: var(--bg);
  clip-path: polygon(0% 100%, 2% 0%, 4% 100%, 6% 0%, 8% 100%, 10% 0%, 12% 100%, 14% 0%, 16% 100%, 18% 0%, 20% 100%, 22% 0%, 24% 100%, 26% 0%, 28% 100%, 30% 0%, 32% 100%, 34% 0%, 36% 100%, 38% 0%, 40% 100%, 42% 0%, 44% 100%, 46% 0%, 48% 100%, 50% 0%, 52% 100%, 54% 0%, 56% 100%, 58% 0%, 60% 100%, 62% 0%, 64% 100%, 66% 0%, 68% 100%, 70% 0%, 72% 100%, 74% 0%, 76% 100%, 78% 0%, 80% 100%, 82% 0%, 84% 100%, 86% 0%, 88% 100%, 90% 0%, 92% 100%, 94% 0%, 96% 100%, 98% 0%, 100% 100%);
}
.header-characters {
  display: flex;
  align-items: flex-end;
  justify-content: center;
  gap: 0;
  padding-top: 16px;
  position: relative;
  z-index: 2;
}
/* Tom SVG */
.tom-svg, .jerry-svg { flex-shrink: 0; }

.header-text {
  padding: 10px 20px 20px;
  position: relative; z-index: 2;
}
.header h1 {
  font-family: 'Nunito', sans-serif;
  font-size: clamp(18px, 5vw, 28px);
  font-weight: 900;
  color: #fff;
  letter-spacing: -0.3px;
  text-shadow: 0 2px 8px rgba(0,0,0,0.3);
}
.header-date {
  margin-top: 8px;
  display: inline-flex;
  align-items: center;
  gap: 8px;
  background: rgba(255,255,255,0.18);
  backdrop-filter: blur(8px);
  border: 1px solid rgba(255,255,255,0.25);
  border-radius: 20px;
  padding: 5px 16px;
  color: rgba(255,255,255,0.95);
  font-size: 12px;
  font-weight: 700;
}

/* ── CONTAINER ── */
.container { max-width: 680px; margin: 0 auto; padding: 14px 14px 80px; }

/* ── CARD ── */
.card {
  background: var(--surface);
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  margin-bottom: 12px;
  overflow: hidden;
  border: 1px solid var(--border);
}
.card-header {
  padding: 13px 16px 11px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.card-title {
  font-family: 'Nunito', sans-serif;
  font-size: 15px;
  font-weight: 900;
  color: var(--text);
  display: flex;
  align-items: center;
  gap: 7px;
}
.title-icon { font-size: 16px; }
.btn-sm {
  background: var(--tom-blue-light);
  color: var(--tom-blue);
  border: 1.5px solid #b8d4ec;
  border-radius: 10px;
  padding: 5px 12px;
  font-size: 12px;
  font-weight: 700;
  cursor: pointer;
  font-family: 'Noto Sans TC', sans-serif;
  transition: all 0.15s;
}
.btn-sm:hover { background: var(--tom-blue); color: white; border-color: var(--tom-blue); }

/* ── TODO ── */
.todo-list { padding: 12px 16px; display: flex; flex-wrap: wrap; gap: 8px; }
.todo-chip {
  display: flex; align-items: center; gap: 7px;
  border: 1.5px solid var(--border);
  border-radius: 20px;
  padding: 6px 12px 6px 8px;
  font-size: 13px; font-weight: 600;
  color: var(--text2);
  cursor: pointer; transition: all 0.18s;
  user-select: none; background: var(--surface2);
}
.todo-chip:hover { border-color: var(--tom-blue); color: var(--tom-blue); background: var(--tom-blue-light); }
.todo-chip.done { border-color: #b6e8cc; background: #f0fbf5; color: #2a8a55; text-decoration: line-through; opacity: 0.65; }
.todo-cb {
  width: 18px; height: 18px;
  border: 2px solid currentColor; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 10px; font-weight: 900; flex-shrink: 0;
}
.todo-chip.done .todo-cb::after { content: '✓'; }

/* ── EXPENSE ── */
.expense-top {
  background: linear-gradient(135deg, #1a4a75, #2d6fa8);
  padding: 16px 18px;
  display: flex; align-items: center;
  justify-content: space-between; flex-wrap: wrap; gap: 10px;
}
.total-label { font-size: 11px; color: rgba(255,255,255,0.65); font-weight: 700; letter-spacing: 0.5px; text-transform: uppercase; }
.total-amount { font-family: 'Nunito', sans-serif; font-size: 30px; font-weight: 900; color: white; letter-spacing: -1px; }
.total-amount sup { font-size: 14px; font-weight: 700; opacity: 0.8; vertical-align: super; }
.btn-add-exp {
  background: rgba(255,255,255,0.18);
  border: 1.5px solid rgba(255,255,255,0.3);
  color: white; border-radius: 20px;
  padding: 7px 16px; font-size: 13px; font-weight: 700;
  cursor: pointer; font-family: 'Noto Sans TC', sans-serif;
  transition: all 0.15s;
}
.btn-add-exp:hover { background: rgba(255,255,255,0.3); }

.expense-breakdown {
  display: flex; gap: 0;
  border-bottom: 1px solid var(--border);
}
.exp-person {
  flex: 1; padding: 12px 14px;
  border-right: 1px solid var(--border);
  text-align: center;
}
.exp-person:last-child { border-right: none; }
.exp-person-icon { font-size: 22px; margin-bottom: 2px; }
.exp-person-name { font-size: 11px; font-weight: 700; color: var(--text2); }
.exp-person-amt { font-family: 'Nunito', sans-serif; font-size: 16px; font-weight: 900; margin-top: 2px; }
.exp-shared .exp-person-amt { color: var(--tom-blue); }
.exp-mumu .exp-person-amt { color: #c9880a; }
.exp-boyu .exp-person-amt { color: var(--red-accent); }

.expense-log { padding: 0 16px; }
.exp-row {
  display: flex; align-items: center; justify-content: space-between;
  padding: 9px 0; border-bottom: 1px solid var(--border); gap: 10px;
}
.exp-row:last-child { border-bottom: none; }
.exp-row-left { display: flex; align-items: center; gap: 8px; min-width: 0; }
.exp-badge {
  font-size: 10px; font-weight: 800;
  padding: 2px 8px; border-radius: 8px;
  white-space: nowrap; flex-shrink: 0;
}
.eb-shared { background: #dbeafe; color: #1e4a8a; }
.eb-mumu { background: #fef3c7; color: #92600a; }
.eb-boyu { background: #fee2e2; color: #9b2c2c; }
.exp-desc { font-size: 13px; color: var(--text); font-weight: 500; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.exp-right { display: flex; align-items: center; gap: 6px; flex-shrink: 0; }
.exp-amt { font-family: 'Nunito', sans-serif; font-size: 14px; font-weight: 800; color: var(--text); }
.btn-del-exp {
  width: 24px; height: 24px; border: none; background: none;
  color: var(--text3); cursor: pointer; border-radius: 50%;
  font-size: 15px; display: flex; align-items: center; justify-content: center;
  transition: all 0.15s;
}
.btn-del-exp:hover { background: #fee2e2; color: #e53e3e; }

/* ── TABS ── */
.tabs {
  background: var(--surface);
  border-radius: var(--radius);
  border: 1px solid var(--border);
  box-shadow: var(--shadow);
  margin-bottom: 12px;
  padding: 6px;
  display: flex; gap: 4px;
  overflow-x: auto; -webkit-overflow-scrolling: touch;
  scrollbar-width: none;
}
.tabs::-webkit-scrollbar { display: none; }
.tab {
  flex: 1; min-width: 68px;
  padding: 8px 10px; border-radius: 10px;
  text-align: center; cursor: pointer;
  transition: all 0.18s; white-space: nowrap;
}
.tab:hover { background: var(--surface2); }
.tab.active { background: var(--tom-blue); color: white; }
.tab .dn { font-family: 'Nunito', sans-serif; font-size: 14px; font-weight: 900; display: block; }
.tab .dd { font-size: 10px; opacity: 0.7; font-weight: 600; }
.tab.active .dd { opacity: 0.85; }

/* ── DAY ── */
.day-panel { display: none; }
.day-panel.active { display: block; }

.flight-card {
  background: linear-gradient(135deg, #0f2a45, #1a4a75);
  border-radius: var(--radius);
  border: 1px solid rgba(255,255,255,0.08);
  padding: 14px 18px;
  display: flex; align-items: center; gap: 14px;
  margin-bottom: 12px;
  box-shadow: var(--shadow);
}
.flight-icon { font-size: 28px; animation: ffly 3s ease-in-out infinite; }
@keyframes ffly { 0%,100%{transform:translateX(0) rotate(-8deg)} 50%{transform:translateX(5px) rotate(-4deg)} }
.flight-num { font-size: 11px; color: rgba(255,255,255,0.5); font-weight: 700; letter-spacing: 1px; }
.flight-route { font-family: 'Nunito', sans-serif; font-size: 17px; font-weight: 900; color: var(--jerry-amber); }
.flight-time { font-size: 12px; color: rgba(255,255,255,0.78); }
.flight-main { display:flex; flex-direction:column; gap:6px; min-width:0; }
.flight-topline {
  display:flex; align-items:center; justify-content:space-between; gap:10px; flex-wrap:wrap;
}
.flight-num {
  display:inline-flex; align-items:center; gap:8px;
  background: rgba(255,255,255,0.12);
  padding: 5px 10px; border-radius: 999px;
}
.flight-airline-logo {
  display:inline-flex; align-items:center; gap:7px;
  padding: 5px 10px;
  border-radius: 999px;
  background: rgba(255,255,255,0.14);
  border: 1px solid rgba(255,255,255,0.18);
  backdrop-filter: blur(4px);
  max-width: 100%;
}
.flight-airline-logo .logo-mark {
  width: 22px; height: 22px;
  border-radius: 50%;
  display:inline-flex; align-items:center; justify-content:center;
  font-size: 11px; font-weight: 900;
  color:#fff;
  flex-shrink:0;
}
.flight-airline-logo .logo-text {
  font-size: 11px; font-weight: 900; letter-spacing: .04em; color:#fff;
  white-space: nowrap;
}
.flight-airline-logo.tigerair .logo-mark {
  background: linear-gradient(135deg, #ff9800, #ff6a00);
}
.flight-airline-logo.eva .logo-mark {
  background: linear-gradient(135deg, #2f8f63, #19694a);
}
.flight-airline-logo.generic .logo-mark {
  background: linear-gradient(135deg, #6380a8, #3f5f86);
}
.route-go-badge {
  display:inline-flex; align-items:center; justify-content:center;
  padding: 2px 8px; border-radius: 999px;
  font-size: 10px; font-weight: 900; letter-spacing: .04em;
  background: rgba(255,255,255,0.18); color: #fff8ef;
  border: 1px solid rgba(255,255,255,0.18);
  vertical-align: middle;
}
.flight-route { display:flex; align-items:center; gap:8px; flex-wrap:wrap; }
.flight-route-from, .flight-route-to { display:inline-flex; align-items:center; }
.day-route {
  display:inline-flex; align-items:center; gap:6px; flex-wrap:wrap;
}
.day-route .route-go-badge {
  background: #f9ede7;
  border-color: #ead4c8;
  color: #9f2f24;
}
@media (max-width: 520px) {
  .flight-topline { align-items:flex-start; }
  .flight-airline-logo .logo-text { font-size: 10px; }
}

.day-card { background: var(--surface); border-radius: var(--radius); border: 1px solid var(--border); box-shadow: var(--shadow); overflow: hidden; margin-bottom: 12px; }
.day-banner {
  padding: 13px 16px;
  display: flex; align-items: center; justify-content: space-between;
  border-bottom: 1px solid var(--border);
  background: linear-gradient(90deg, #fdf8f2, var(--surface));
}
.day-banner-l { display: flex; align-items: center; gap: 10px; }
.day-label { font-family: 'Nunito', sans-serif; font-size: 20px; font-weight: 900; color: var(--tom-blue); }
.day-info { font-size: 12px; color: var(--text2); font-weight: 600; }
.btn-add-item {
  background: var(--tom-blue-light); color: var(--tom-blue);
  border: 1.5px solid #b8d4ec; border-radius: 20px;
  padding: 6px 14px; font-size: 12px; font-weight: 700;
  cursor: pointer; font-family: 'Noto Sans TC', sans-serif;
  transition: all 0.15s; display: flex; align-items: center; gap: 4px;
}
.btn-add-item:hover { background: var(--tom-blue); color: white; border-color: var(--tom-blue); }

.time-row {
  padding: 10px 16px 4px;
  display: flex; align-items: center; gap: 8px;
}
.time-pill {
  font-family: 'Nunito', sans-serif;
  font-size: 11px; font-weight: 900;
  padding: 3px 11px; border-radius: 10px; letter-spacing: 0.3px;
}
.tp-morn { background: #fef9e8; color: #a06b00; border: 1px solid #f5e2a0; }
.tp-noon { background: #edfbf4; color: #1a7a50; border: 1px solid #a8e8c8; }
.tp-night { background: #eef2fc; color: #2d5fa8; border: 1px solid #bdd0f0; }
.time-div { flex:1; height:1px; background: var(--border); }

/* ── ITEM CARD / DRAG ── */
.item-list { min-height: 20px; padding: 2px 12px 12px; }
.item-list.drag-over {
  background: #eef6fd;
  border: 2px dashed #7aaed6;
  border-radius: 14px;
}
.item-row {
  position: relative;
  display: flex; align-items: flex-start;
  gap: 12px; padding: 14px;
  margin-top: 10px;
  background: var(--surface2);
  border: 1.5px solid var(--border);
  border-radius: 16px;
  box-shadow: 0 2px 8px rgba(42,31,21,0.05);
  transition: transform 0.15s, box-shadow 0.15s, border-color 0.15s, background 0.15s;
  cursor: grab;
}
.item-row:first-child { margin-top: 0; }
.item-row:hover {
  background: #fffdfb;
  border-color: #d8c4b2;
  box-shadow: 0 6px 18px rgba(42,31,21,0.08);
  transform: translateY(-1px);
}
.item-row:active { cursor: grabbing; }
.item-row.dragging { opacity: 0.45; transform: scale(0.985); box-shadow: none; }
.item-list { min-height: 10px; }
.drop-indicator {
  height: 0;
  border-top: 3px solid var(--tom-blue);
  border-radius: 999px;
  margin: 8px 12px;
  box-shadow: 0 0 0 1px rgba(255,255,255,0.85);
}
.item-move-badge {
  position: absolute;
  top: 10px; left: 10px;
  font-size: 11px; font-weight: 800;
  color: var(--text3);
  background: white;
  border: 1px dashed #d6c5b8;
  border-radius: 999px;
  padding: 2px 8px;
}

/* SVG icon wrapper */
.type-icon-wrap {
  width: 36px; height: 36px;
  border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0; margin-top: 1px;
}
.ti-bg-food { background: #fff3e8; }
.ti-bg-sight { background: #eef8f0; }
.ti-bg-transport { background: #e8f2fb; }
.ti-bg-hotel { background: #fdf0f8; }
.ti-bg-shop { background: #fdf5e0; }

.item-body { flex: 1; min-width: 0; }
.item-name { font-size: 14px; font-weight: 700; color: var(--text); line-height: 1.35; }
.item-name a { color: var(--tom-blue); text-decoration: none; display: inline-flex; align-items: center; gap: 6px; }
.item-name a:hover { text-decoration: underline; }
.item-name a::after {
  content: '前往';
  font-size: 10px;
  opacity: 1;
  font-weight: 800;
  letter-spacing: .04em;
  padding: 2px 7px;
  border-radius: 999px;
  background: #f9ede7;
  color: #9f2f24;
  border: 1px solid #ead4c8;
  line-height: 1.2;
}
.item-tags { display: flex; gap: 5px; flex-wrap: wrap; margin-top: 3px; align-items: center; }
.tag-loc { background: #e8f4fb; color: #1a6090; font-size: 11px; font-weight: 600; padding: 1px 7px; border-radius: 6px; }
.tag-booked { background: #e8f8ef; color: #1a7a50; font-size: 11px; font-weight: 600; padding: 1px 7px; border-radius: 6px; }
.item-note { font-size: 11px; color: var(--text3); margin-top: 3px; line-height: 1.5; }
.item-actions { display: flex; gap: 3px; flex-shrink: 0; margin-top: 18px; }
.btn-icon {
  width: 28px; height: 28px; border: none;
  border-radius: 8px; cursor: pointer; font-size: 13px;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.15s;
}
.btn-edit-i { background: #eef2fb; color: #3d5fc8; }
.btn-edit-i:hover { background: #3d5fc8; color: white; }
.btn-del-i { background: #feeeed; color: #d94040; }
.btn-del-i:hover { background: #d94040; color: white; }

/* ── MODAL ── */
.overlay {
  display: none; position: fixed; inset: 0;
  background: rgba(15,20,30,0.55);
  backdrop-filter: blur(6px);
  z-index: 999;
  align-items: center; justify-content: center;
  padding: 16px;
}
.overlay.open { display: flex; }
.modal {
  background: white; border-radius: 20px;
  width: 100%; max-width: 420px;
  box-shadow: var(--shadow-md); overflow: hidden;
  animation: slideUp 0.22s cubic-bezier(0.34,1.4,0.64,1);
  border: 1px solid var(--border);
}
@keyframes slideUp { from{transform:translateY(22px);opacity:0} to{transform:translateY(0);opacity:1} }
.modal-head {
  padding: 15px 18px;
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
  background: linear-gradient(90deg, var(--tom-blue-light), white);
}
.modal-head h3 { font-family: 'Nunito', sans-serif; font-size: 16px; font-weight: 900; color: var(--text); }
.modal-x {
  width: 28px; height: 28px; border: none;
  background: var(--surface2); border-radius: 50%;
  cursor: pointer; font-size: 16px; color: var(--text2);
  display: flex; align-items: center; justify-content: center;
  transition: all 0.15s;
}
.modal-x:hover { background: #fee2e2; color: #e53e3e; }
.modal-body { padding: 16px 18px; display: flex; flex-direction: column; gap: 12px; }
.field label { display: block; font-size: 11px; font-weight: 800; color: var(--text2); margin-bottom: 5px; letter-spacing: 0.4px; text-transform: uppercase; }
.field input, .field select, .field textarea {
  width: 100%; border: 1.5px solid var(--border);
  border-radius: 10px; padding: 9px 12px;
  font-family: 'Noto Sans TC', sans-serif; font-size: 14px; color: var(--text);
  outline: none; transition: border 0.18s; background: var(--surface2);
}
.field input:focus, .field select:focus, .field textarea:focus { border-color: var(--tom-blue); background: white; }
.field textarea { resize: vertical; min-height: 56px; }
.modal-foot { padding: 0 18px 18px; display: flex; gap: 8px; }
.btn-cancel {
  flex: 1; padding: 10px; border: 1.5px solid var(--border);
  border-radius: 10px; background: white; color: var(--text2);
  font-family: 'Noto Sans TC', sans-serif; font-size: 14px; font-weight: 700;
  cursor: pointer; transition: all 0.15s;
}
.btn-cancel:hover { background: var(--surface2); }
.btn-save {
  flex: 2; padding: 10px; border: none;
  border-radius: 10px; background: var(--tom-blue); color: white;
  font-family: 'Noto Sans TC', sans-serif; font-size: 14px; font-weight: 700;
  cursor: pointer; transition: all 0.15s;
  box-shadow: 0 2px 8px rgba(45,111,168,0.4);
}
.btn-save:hover { background: var(--tom-blue-dark); }

/* FAB */
.fab {
  position: fixed; bottom: 20px; right: 16px;
  width: 44px; height: 44px;
  background: var(--tom-blue); color: white;
  border: none; border-radius: 50%; font-size: 18px;
  cursor: pointer;
  box-shadow: 0 4px 16px rgba(45,111,168,0.45);
  display: flex; align-items: center; justify-content: center;
  z-index: 100; transition: all 0.18s;
}
.fab:hover { background: var(--tom-blue-dark); transform: translateY(-2px); }

.small-hint { font-size:11px; color: var(--text3); margin-top:6px; line-height:1.5; }


/* forecast badge */
.day-weather-badge{
  display:inline-flex;
  align-items:center;
  justify-content:center;
  width:26px;
  height:26px;

let lastCloudJson = '';

function setCloudStatus(text) {
  const el = document.getElementById('cloudStatus');
  if (el && el.textContent !== text) el.textContent = text;
}

function scheduleCloudSave() {
  if (applyingStoredData || !cloudReady) return;
  clearTimeout(cloudSaveTimer);
  cloudSaveTimer = setTimeout(saveCloudData, 900);
}

async function saveCloudData() {
  if (applyingStoredData) return;
  const payload = getPayload();
  const json = JSON.stringify(payload);
  if (json === lastCloudJson) return;

  try {
    setCloudStatus('☁️ 雲端同步中…');
    await set(tripRef, payload);
    lastCloudJson = json;
    setCloudStatus('☁️ 已同步');
  } catch (err) {
    console.warn('雲端儲存失敗，已保留本機資料。', err);
    setCloudStatus('☁️ 雲端同步失敗，本機已儲存');
  }
}

async function initCloudSync() {
  try {
    setCloudStatus('☁️ 連線中…');
    const snap = await get(tripRef);

    if (snap.exists()) {
      const cloudData = snap.val();
      lastCloudJson = JSON.stringify(cloudData);
      applyPayload(cloudData);
      saveLocalData();
      render();
      setCloudStatus('☁️ 已載入雲端資料');
    } else {
      const initialPayload = getPayload();
      await set(tripRef, initialPayload);
      lastCloudJson = JSON.stringify(initialPayload);
      setCloudStatus('☁️ 已建立雲端資料');
    }

    cloudReady = true;

    onValue(tripRef, (snapshot) => {
      if (!snapshot.exists()) return;
      const cloudData = snapshot.val();
      const cloudJson = JSON.stringify(cloudData);
      if (cloudJson === lastCloudJson) return;

      lastCloudJson = cloudJson;
      applyPayload(cloudData);
      saveLocalData();
      render();
      setCloudStatus('☁️ 已同步');
    }, (err) => {
      console.warn('雲端監聽失敗。', err);
      setCloudStatus('☁️ 雲端連線異常');
    });
  } catch (err) {
    console.warn('Firebase 初始化或讀取失敗，先使用本機資料。', err);
    setCloudStatus('☁️ 雲端未連線，本機模式');
  }
}

function clearDropIndicator() {
  document.querySelectorAll('.drop-indicator').forEach(el => el.remove());
  document.querySelectorAll('.item-list.drag-over').forEach(el => el.classList.remove('drag-over'));
  currentDropTarget = null;
}

function getDropIndex(listEl, clientY) {
  const rows = [...listEl.querySelectorAll('.item-row:not(.dragging)')];
  let toIndex = rows.length;
  for (let i = 0; i < rows.length; i++) {
    const rect = rows[i].getBoundingClientRect();
    const mid = rect.top + rect.height / 2;
    if (clientY < mid) {
      toIndex = i;
      break;
    }
  }
  return toIndex;
}

function showDropIndicator(listEl, clientY) {
  clearDropIndicator();
  listEl.classList.add('drag-over');

  const rows = [...listEl.querySelectorAll('.item-row:not(.dragging)')];
  const toIndex = getDropIndex(listEl, clientY);
  const indicator = document.createElement('div');
  indicator.className = 'drop-indicator';
  indicator.dataset.index = String(toIndex);

  if (!rows.length || toIndex >= rows.length) {
    listEl.appendChild(indicator);
  } else {
    listEl.insertBefore(indicator, rows[toIndex]);
  }

  currentDropTarget = { el: listEl, index: toIndex };
}

function getCurrentSettlementSnapshot() {
  const fmt = n => n === 0 ? '0' : (n % 1 === 0 ? n.toString() : n.toFixed(1));

  let owedByMumu = 0;
  let owedByBoyu = 0;
  let paidByMumu = 0;
  let paidByBoyu = 0;

  expenses.forEach(e => {
    const payer = e.payer || (e.who === 'boyu' ? 'boyu' : 'mumu');
    if (payer === 'mumu') paidByMumu += e.amount;
    if (payer === 'boyu') paidByBoyu += e.amount;

    if (e.who === 'shared') {
      owedByMumu += e.amount / 2;
      owedByBoyu += e.amount / 2;
    } else if (e.who === 'mumu') {
      owedByMumu += e.amount;
    } else if (e.who === 'boyu') {
      owedByBoyu += e.amount;
    }
  });

  const rawMumuNet = paidByMumu - owedByMumu;
  const rawBoyuNet = paidByBoyu - owedByBoyu;

  const adjustedMumuNet = rawMumuNet - Number(settledOffsets.mumu || 0);
  const adjustedBoyuNet = rawBoyuNet - Number(settledOffsets.boyu || 0);

  const mumuAdvanceTotal = Math.max(adjustedMumuNet, 0);
  const boyuAdvanceTotal = Math.max(adjustedBoyuNet, 0);

  let mainText = '目前沒有墊付資料';
  let subText = '新增花費時指定實際付款人後，這裡就會自動計算。';
  let amount = 0;
  let direction = 'none';

  if (expenses.length > 0 || settledOffsets.mumu || settledOffsets.boyu) {
    if (Math.abs(adjustedMumuNet) < 0.01 && Math.abs(adjustedBoyuNet) < 0.01) {
      mainText = '目前已經結清，不需要互相還款';
      subText = '雙方目前的墊付金額已經平衡。';
    } else if (adjustedMumuNet > 0) {
      amount = Math.abs(adjustedMumuNet);
      direction = 'boyu_to_mumu';
      mainText = `波魚應還小姆 JPY ${fmt(amount)}`;
      const totalShared = expenses.filter(e => e.who === 'shared').reduce((a,b)=>a+b.amount,0);
      const perPerson = totalShared / 2;
      subText = totalShared > 0
        ? `共同花費 JPY ${fmt(totalShared)}，每人應分攤 JPY ${fmt(perPerson)}。小姆目前墊付較多。`
        : '小姆目前墊付較多。';
    } else {
      amount = Math.abs(adjustedBoyuNet);
      direction = 'mumu_to_boyu';
      mainText = `小姆應還波魚 JPY ${fmt(amount)}`;
      const totalShared = expenses.filter(e => e.who === 'shared').reduce((a,b)=>a+b.amount,0);
      const perPerson = totalShared / 2;
      subText = totalShared > 0
        ? `共同花費 JPY ${fmt(totalShared)}，每人應分攤 JPY ${fmt(perPerson)}。波魚目前墊付較多。`
        : '波魚目前墊付較多。';
    }
  }

  return {
    mainText,
    subText,
    amount,
    direction,
    mumuAdvanceTotal,
    boyuAdvanceTotal,
    adjustedMumuNet,
    adjustedBoyuNet
  };
}

window.deleteSettlementRecord = function deleteSettlementRecord(index) {
  if (index < 0 || index >= settlementRecords.length) return;
  const ok = confirm('確認刪除這筆結清紀錄？');
  if (!ok) return;

  // Rebuild offsets from remaining records is safer than trying to reverse one ambiguous record.
  settlementRecords.splice(index, 1);
  settledOffsets = { mumu: 0, boyu: 0 };
  // Re-apply all remaining settlement records in order based on current raw settlement direction snapshot at time of each record is not stored,
  // so after manual deletion, reset cumulative offsets and keep current帳目重新計算。
  // This means刪除紀錄後，已結清效果會一併取消。
  afterDataChange();
  renderSettlement();
  alert('已刪除結清紀錄');
}

window.settleAdvance = globalThis.settleAdvance = function settleAdvance() {
  const snapshot = getCurrentSettlementSnapshot();
  if (snapshot.amount <= 0) {
    alert('目前沒有需要結清的墊付金額');
    return;
  }
  const ok = confirm(`確認結清這筆金額？\n${snapshot.mainText}`);
  if (!ok) return;

  const fmt = n => n === 0 ? '0' : (n % 1 === 0 ? n.toString() : n.toFixed(1));
  const now = new Date();
  const timeText = `${now.getFullYear()}/${String(now.getMonth()+1).padStart(2,'0')}/${String(now.getDate()).padStart(2,'0')} ${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;

  if (snapshot.direction === 'boyu_to_mumu') {
    settledOffsets.mumu = Number(settledOffsets.mumu || 0) + snapshot.amount;
    settledOffsets.boyu = Number(settledOffsets.boyu || 0) - snapshot.amount;
  } else if (snapshot.direction === 'mumu_to_boyu') {
    settledOffsets.mumu = Number(settledOffsets.mumu || 0) - snapshot.amount;
    settledOffsets.boyu = Number(settledOffsets.boyu || 0) + snapshot.amount;
  }

  settlementRecords.push({
    timeText,
    amountText: fmt(snapshot.amount)
  });
  afterDataChange();
  renderSettlement();
}

const bookingStatusStyles = {
  '需要預約': 'tag-book-need',
  '已預約': 'tag-book-done',
  '可預約': 'tag-book-can',
  '等候確認': 'tag-book-wait',
  '現場排隊': 'tag-book-queue'
};

function normalizeBookingStatus(value) {
  if (value === true || value === '1') return '已預約';
  if (value === false || value === '0' || value === null || value === undefined) return '未預約';
  const status = String(value).trim();
  if (!status || status === '未預約') return '未預約';
  return bookingStatusStyles[status] ? status : '未預約';
}

function bookingStatusTag(value) {
  const status = normalizeBookingStatus(value);
  if (status === '未預約') return '';
  const cls = bookingStatusStyles[status] || 'tag-book-can';
  return `<span class="tag-booking ${cls}">${status}</span>`;
}

function formatGoRoute(text='') {
  const value = String(text || '').trim();
  if (!value) return '';
  if (value.includes('→')) {
    const parts = value.split('→').map(s => s.trim()).filter(Boolean);
    if (parts.length >= 2) return `<span class="day-route"><span>${parts[0]}</span><span class="route-go-badge">前往</span><span>${parts.slice(1).join(' / ')}</span></span>`;
  }
  if (value.includes('✈')) {
    const parts = value.split('✈').map(s => s.trim()).filter(Boolean);
    if (parts.length >= 2) return `<span class="day-route"><span>${parts[0]}</span><span class="route-go-badge">前往</span><span>${parts.slice(1).join(' / ')}</span></span>`;
  }
  return value;
}

function formatFlightRoute(text='') {
  return String(text || '').trim();
}

function renderPanels() {
  const el = document.getElementById('panels');
  if (!el) return;
  el.innerHTML = '';

  const d = itinerary[activeDay];
  if (!d) return;
  const di = activeDay;

  const panel = document.createElement('div');
  panel.className = 'day-panel active';

  if (d.flight) {
    const fc = document.createElement('div');
    fc.className = 'flight-card';
    fc.innerHTML = `<div class="flight-icon">✈️</div><div class="flight-main"><div class="flight-topline">${renderAirlineLogo(d.flight.num)}<div class="flight-num">${escapeHTML(d.flight.num)}</div></div><div class="flight-route">${escapeHTML(d.flight.route)}</div><div class="flight-time">${escapeHTML(d.flight.time)}</div></div>`;
    panel.appendChild(fc);
  }

  const dc = document.createElement('div');
  dc.className = 'day-card';

  const banner = document.createElement('div');
  banner.className = 'day-banner';
  banner.innerHTML = `
    <div class="day-banner-l">
      <div class="day-label">${escapeHTML(d.label)}</div>
      <div class="day-info">${escapeHTML(d.date)} · ${formatGoRoute(escapeHTML(d.city))}</div>
    </div>
    <button class="btn-add-item" onclick="openAddModal(${di})">＋ 新增</button>`;
  dc.appendChild(banner);

  d.groups.forEach((g, gi) => {
    const tc = g.time === '早上' ? 'tp-morn' : g.time.includes('下午') ? 'tp-noon' : 'tp-night';
    const tRow = document.createElement('div');
    tRow.className = 'time-row';
    tRow.innerHTML = `<div class="time-pill ${tc}">${escapeHTML(g.time)}</div><div class="time-div"></div>`;
    dc.appendChild(tRow);

    const list = document.createElement('div');
    list.className = 'item-list';
    list.dataset.di = di;
    list.dataset.gi = gi;
    list.addEventListener('dragover', handleListDragOver);
    list.addEventListener('dragleave', handleListDragLeave);
    list.addEventListener('drop', handleListDrop);

    if (!g.items.length) {
      const empty = document.createElement('div');
      empty.style.cssText = 'padding:10px 16px;color:var(--text3);font-size:12px;font-style:italic;';
      empty.textContent = '尚無行程';
      list.appendChild(empty);
    } else {
      g.items.forEach((item, ii) => {
        const row = document.createElement('div');
        row.className = 'item-row';
        row.draggable = true;
        row.dataset.di = di;
        row.dataset.gi = gi;
        row.dataset.ii = ii;
        row.addEventListener('dragstart', handleItemDragStart);
        row.addEventListener('dragend', handleItemDragEnd);
        const safeUrl = escapeHTML(item.url || '');
        const safeName = escapeHTML(item.name || '');
        const nameHtml = item.url
          ? `<a href="${safeUrl}" target="_blank" rel="noopener">${safeName}</a>`
          : safeName;
        const locTag = item.location ? `<span class="tag-loc">📍 ${escapeHTML(item.location)}</span>` : '';
        const bookedTag = bookingStatusTag(item.booked);
        const noteHtml = item.note ? `<div class="item-note">${escapeHTML(item.note)}</div>` : '';
        row.innerHTML = `
          <div class="type-icon-wrap ${typeBg[item.type]||''}" style="margin-top:18px;">${svgIcons[item.type]||''}</div>
          <div class="item-body" style="padding-top:18px;">
            <div class="item-name">${nameHtml}</div>
            <div class="item-tags">${locTag}${bookedTag}</div>
            ${noteHtml}
          </div>
          <div class="item-actions">
            <button class="btn-icon btn-edit-i" onclick="event.stopPropagation();openEditModal(${di},${gi},${ii})">✏️</button>
            <button class="btn-icon btn-del-i" onclick="event.stopPropagation();deleteItem(${di},${gi},${ii})">🗑️</button>
          </div>`;
        list.appendChild(row);
      });
    }

    dc.appendChild(list);
  });

  panel.appendChild(dc);
  el.appendChild(panel);
}

function handleItemDragStart(e) {
  dragState = {
    fromDi: Number(this.dataset.di),
    fromGi: Number(this.dataset.gi),
    fromIi: Number(this.dataset.ii),
  };
  this.classList.add('dragging');
  if (e.dataTransfer) {
    e.dataTransfer.effectAllowed = 'move';
    e.dataTransfer.setData('text/plain', JSON.stringify(dragState));
  }
}
function handleItemDragEnd() {
  this.classList.remove('dragging');
  clearDropIndicator();
}
function handleListDragOver(e) {
  if (!dragState) return;
  e.preventDefault();
  showDropIndicator(this, e.clientY);
}
function handleListDragLeave(e) {
  const rect = this.getBoundingClientRect();
  const x = e.clientX;
  const y = e.clientY;
  const isOutside = x < rect.left || x > rect.right || y < rect.top || y > rect.bottom;
  if (isOutside && currentDropTarget && currentDropTarget.el === this) {
    clearDropIndicator();
  }
}
function handleListDrop(e) {
  if (!dragState) return;
  e.preventDefault();

  const listEl = this;
  const toDi = Number(listEl.dataset.di);
  const toGi = Number(listEl.dataset.gi);
  const toIndex = currentDropTarget && currentDropTarget.el === listEl
    ? currentDropTarget.index
    : getDropIndex(listEl, e.clientY);

  clearDropIndicator();
  moveItem(dragState.fromDi, dragState.fromGi, dragState.fromIi, toDi, toGi, toIndex);
  dragState = null;
}
function moveItem(fromDi, fromGi, fromIi, toDi, toGi, toIndex) {
  const sourceItems = itinerary[fromDi].groups[fromGi].items;
  const [moved] = sourceItems.splice(fromIi, 1);
  const targetItems = itinerary[toDi].groups[toGi].items;

  if (toIndex < 0) toIndex = 0;
  if (toIndex > targetItems.length) toIndex = targetItems.length;

  targetItems.splice(toIndex, 0, moved);
  afterDataChange();
}

// ── ITEM MODAL ──
function openAddModal(di) {
  pendingDayIdx = di; editTarget = null;
  document.getElementById('itemModalTitle').textContent = '新增行程';
  document.getElementById('f-type').value = '景點';
  document.getElementById('f-time').selectedIndex = 0;
  ['f-name','f-url','f-location','f-note'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('f-booked').value = '未預約';
  document.getElementById('itemModal').classList.add('open');
}
function openEditModal(di, gi, ii) {
  editTarget = {di, gi, ii}; pendingDayIdx = di;
  const item = itinerary[di].groups[gi].items[ii];
  document.getElementById('itemModalTitle').textContent = '編輯行程';
  document.getElementById('f-type').value = item.type;
  document.getElementById('f-time').value = itinerary[di].groups[gi].time;
  document.getElementById('f-name').value = item.name;
  document.getElementById('f-url').value = item.url || '';
  document.getElementById('f-location').value = item.location || '';
  document.getElementById('f-note').value = item.note || '';
  document.getElementById('f-booked').value = normalizeBookingStatus(item.booked);
  document.getElementById('itemModal').classList.add('open');
}
function closeItemModal() { document.getElementById('itemModal').classList.remove('open'); }
function saveItem() {
  const name = document.getElementById('f-name').value.trim();
  if (!name) { alert('請輸入名稱！'); return; }
  const newItem = {
    type: document.getElementById('f-type').value,
    name, url: document.getElementById('f-url').value.trim(),
    location: document.getElementById('f-location').value.trim(),
    note: document.getElementById('f-note').value.trim(),
    booked: normalizeBookingStatus(document.getElementById('f-booked').value),
  };
  const time = document.getElementById('f-time').value;
  if (editTarget) {
    const {di, gi, ii} = editTarget;
    if (itinerary[di].groups[gi].time !== time) {
      itinerary[di].groups[gi].items.splice(ii, 1);
      let tg = itinerary[di].groups.find(g=>g.time===time);
      if (!tg) { itinerary[di].groups.push({time,items:[]}); tg=itinerary[di].groups.at(-1); }
      tg.items.push(newItem);
    } else { itinerary[di].groups[gi].items[ii] = newItem; }
  } else {
    let tg = itinerary[pendingDayIdx].groups.find(g=>g.time===time);
    if (!tg) { itinerary[pendingDayIdx].groups.push({time,items:[]}); tg=itinerary[pendingDayIdx].groups.at(-1); }
    tg.items.push(newItem);
  }
  closeItemModal(); afterDataChange();
}
function deleteItem(di, gi, ii) {
  if (!confirm('確定刪除？')) return;
  itinerary[di].groups[gi].items.splice(ii, 1); afterDataChange();
}

// ── EXPENSE MODAL ──

function toggleExpensePayerField() {
  const wrap = document.getElementById('e-payer-wrap');
  if (!wrap) return;
  wrap.style.display = '';
}

function openExpenseModal() {
  document.getElementById('e-who').value = 'shared';
  document.getElementById('e-payer').value = 'mumu';
  toggleExpensePayerField();
  document.getElementById('e-desc').value = '';
  document.getElementById('e-amount').value = '';
  document.getElementById('expenseModal').classList.add('open');
}
function closeExpenseModal() { document.getElementById('expenseModal').classList.remove('open'); }
function saveExpense() {
  const desc = document.getElementById('e-desc').value.trim();
  const amount = parseFloat(document.getElementById('e-amount').value);
  if (!desc) { alert('請輸入項目名稱！'); return; }
  if (isNaN(amount) || amount <= 0) { alert('請輸入有效金額！'); return; }
  const who = document.getElementById('e-who').value;
  const payer = document.getElementById('e-payer').value;
  expenses.push({who, payer, desc, amount});

}
function deleteExpense(i) { expenses.splice(i,1); afterDataChange(); }

// ── TODO / SHOPPING MODAL ──
function openTodoModal() {
  document.getElementById('t-label').value = '';
  document.getElementById('todoModal').classList.add('open');
}
function closeTodoModal() { document.getElementById('todoModal').classList.remove('open'); }
function saveTodo() {
  const label = document.getElementById('t-label').value.trim();
  if (!label) { alert('請輸入項目！'); return; }
  todos.push({label, done:false});
  closeTodoModal(); afterDataChange();
}
function openShoppingModal() {
  document.getElementById('s-label').value = '';
  document.getElementById('s-location').value = '';
  const fileInput = document.getElementById('s-image-file');
  const preview = document.getElementById('s-image-preview');
  if (fileInput) fileInput.value = '';
  if (preview) preview.textContent = '尚未選擇圖片';
  document.getElementById('shoppingModal').classList.add('open');
}
function closeShoppingModal() { document.getElementById('shoppingModal').classList.remove('open'); }

function readShoppingImageFile(file) {
  return new Promise((resolve, reject) => {
    if (!file) return resolve('');
    const reader = new FileReader();
    reader.onload = () => resolve(String(reader.result || ''));
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

function previewShoppingImage(event) {
  const file = event.target.files && event.target.files[0];
  const preview = document.getElementById('s-image-preview');
  if (!preview) return;
  if (!file) {
    preview.textContent = '尚未選擇圖片';
    return;
  }
  if (!file.type.startsWith('image/')) {
    preview.textContent = '請選擇圖片檔';
    return;
  }
  const reader = new FileReader();
  reader.onload = () => {
    preview.innerHTML = `<img src="${reader.result}" alt="購物圖片預覽">`;
  };
  reader.readAsDataURL(file);
}

async function saveShoppingItem() {
  const label = document.getElementById('s-label').value.trim();
  const location = document.getElementById('s-location').value.trim();
  const fileInput = document.getElementById('s-image-file');
  const file = fileInput?.files?.[0] || null;
  if (!label) { alert('請輸入購物項目！'); return; }
  if (file && !file.type.startsWith('image/')) { alert('請選擇圖片檔！'); return; }
  let image = '';
  try {
    image = await readShoppingImageFile(file);
  } catch (err) {
    alert('圖片讀取失敗，請換一張圖片試試。');
    return;
  }
  shoppingList.push({label, location, image, done:false});
  closeShoppingModal(); afterDataChange();
}

// 防誤觸：編輯視窗不再因為點到旁邊背景就關閉
// 只能用右上角 ✕ 或下方「取消」關閉，避免輸入到一半不小心消失。
['itemModal','expenseModal','todoModal','shoppingModal'].forEach(id => {
  const modalOverlay = document.getElementById(id);
  if (!modalOverlay) return;
  modalOverlay.addEventListener('click', function(e){
    if (e.target === this) e.preventDefault();
  });
});

function getPayload() {
  return {
    todos: safeClone(todos),
    shoppingList: safeClone(shoppingList),
    expenses: safeClone(expenses),
    itinerary: safeClone(itinerary),
    settlementRecords: safeClone(settlementRecords),
    settledOffsets: safeClone(settledOffsets),
    updatedAt: Date.now()
  };
}

function applyPayload(data = {}) {
  applyingStoredData = true;
  todos = safeArray(data.todos, todos);
  shoppingList = normalizeShoppingList(safeArray(data.shoppingList, shoppingList));
  expenses = safeArray(data.expenses, expenses);
  itinerary = safeArray(data.itinerary, itinerary);
  settlementRecords = safeArray(data.settlementRecords, settlementRecords);
  settledOffsets = (data.settledOffsets && typeof data.settledOffsets === 'object')
    ? data.settledOffsets
    : settledOffsets;
  applyingStoredData = false;
}

function loadLocalData() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return;
    applyPayload(JSON.parse(raw));
  } catch (err) {
    console.warn('本機資料讀取失敗，改用預設行程。', err);
  }
}

function saveLocalData() {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(getPayload()));
  } catch (err) {
    console.warn('本機資料儲存失敗。', err);
  }
}

function saveData() {
  saveLocalData();
  scheduleCloudSave();
}

function resetLocalData() {
  if (!confirm('確定把資料重設為原始預設行程？雲端也會同步重設。')) return;
  todos = safeClone(defaultTodos);
  shoppingList = safeClone(defaultShoppingList);
  expenses = [];
  itinerary = safeClone(defaultItinerary);
  settlementRecords = [];
  settledOffsets = { mumu: 0, boyu: 0 };
  activeDay = 0;
  afterDataChange();
}

function afterDataChange() {
  render();
  saveData();
}

window.resetLocalData = resetLocalData;

Object.assign(window, {
  openAddModal, openEditModal, closeItemModal, saveItem, deleteItem,
  openExpenseModal, closeExpenseModal, saveExpense, deleteExpense,
  openTodoModal, closeTodoModal, saveTodo,
  openShoppingModal, closeShoppingModal, saveShoppingItem, previewShoppingImage,
  switchUtilityPanel, selectWeatherCity
});

const WEATHER_CITIES = {
  osaka: { name: '大阪', latitude: 34.6937, longitude: 135.5023 },
  kyoto: { name: '京都', latitude: 35.0116, longitude: 135.7681 },
  kobe: { name: '神戶', latitude: 34.6901, longitude: 135.1955 }
};
const weatherCodeMap = {
  0:['☀️','晴朗'], 1:['🌤️','大致晴朗'], 2:['⛅','局部多雲'], 3:['☁️','多雲'],
  45:['🌫️','有霧'], 48:['🌫️','霧凇'], 51:['🌦️','細雨'], 53:['🌦️','細雨'], 55:['🌧️','細雨'],
  56:['🌧️','凍雨'], 57:['🌧️','凍雨'], 61:['🌧️','小雨'], 63:['🌧️','降雨'], 65:['🌧️','大雨'],
  66:['🌧️','凍雨'], 67:['🌧️','凍雨'], 71:['🌨️','小雪'], 73:['🌨️','降雪'], 75:['❄️','大雪'],
  77:['🌨️','雪粒'], 80:['🌦️','陣雨'], 81:['🌧️','陣雨'], 82:['⛈️','強陣雨'],
  85:['🌨️','陣雪'], 86:['❄️','強陣雪'], 95:['⛈️','雷雨'], 96:['⛈️','雷雨冰雹'], 99:['⛈️','雷雨冰雹']
};
let currentWeatherCity = 'osaka';
const weatherCache = {};

function weatherIcon(code) {
  return weatherCodeMap[Number(code)] || ['🌤️','天氣'];
}
function formatWeatherDate(iso) {
  const d = new Date(`${iso}T00:00:00`);
  const wk = ['日','一','二','三','四','五','六'][d.getDay()];
  return `${d.getMonth()+1}/${d.getDate()} 週${wk}`;
}
function setWeatherCityButtons(cityKey) {
  document.querySelectorAll('.weather-city-btn').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.city === cityKey);
  });
}
async function loadWeather(cityKey = currentWeatherCity) {
  currentWeatherCity = cityKey;
  const city = WEATHER_CITIES[cityKey] || WEATHER_CITIES.osaka;
  const cityNameEl = document.getElementById('weatherCityName');
  const updated = document.getElementById('weatherUpdated');
  const nowTemp = document.getElementById('weatherNowTemp');
  const nowDesc = document.getElementById('weatherNowDesc');
  const daysEl = document.getElementById('weatherDays');
  const noteEl = document.getElementById('weatherNote');
  if (!updated || !nowTemp || !nowDesc || !daysEl || !cityNameEl) return;
  cityNameEl.textContent = city.name;
  setWeatherCityButtons(cityKey);
  updated.textContent = `正在讀取${city.name}即時天氣...`;
  nowTemp.textContent = '--°';
  nowDesc.textContent = '--';
  daysEl.innerHTML = '<div class="weather-day"><div class="weather-date">讀取中</div><div class="weather-icon">🍵</div><div class="weather-temp">-- / --</div><div class="weather-rain">--</div></div>';
  try {
    let data = weatherCache[cityKey];
    if (!data) {
      const url = `https://api.open-meteo.com/v1/forecast?latitude=${city.latitude}&longitude=${city.longitude}&timezone=Asia%2FTokyo&current=temperature_2m,weather_code,wind_speed_10m&daily=weather_code,temperature_2m_max,temperature_2m_min,precipitation_probability_max&forecast_days=7`;
      const res = await fetch(url);
      if (!res.ok) throw new Error('weather fetch failed');
      data = await res.json();
      weatherCache[cityKey] = data;
    }
    const [icon, desc] = weatherIcon(data.current?.weather_code);
    const temp = Math.round(data.current?.temperature_2m ?? 0);
    const wind = Math.round(data.current?.wind_speed_10m ?? 0);
    nowTemp.textContent = `${temp}°`;
    nowDesc.textContent = `${icon} ${desc} · 風速 ${wind} km/h`;
    const updatedAt = data.current?.time ? data.current.time.replace('T',' ') : '剛剛';
    updated.textContent = `${city.name}即時天氣 · 更新 ${updatedAt}`;

    const times = data.daily?.time || [];
    const maxs = data.daily?.temperature_2m_max || [];
    const mins = data.daily?.temperature_2m_min || [];
    const rains = data.daily?.precipitation_probability_max || [];
    const codes = data.daily?.weather_code || [];
    daysEl.innerHTML = '';
    times.slice(0, 7).forEach((t, i) => {
      const [di] = weatherIcon(codes[i]);
      const card = document.createElement('div');
      card.className = 'weather-day';
      card.innerHTML = `<div class="weather-date">${formatWeatherDate(t)}</div><div class="weather-icon">${di}</div><div class="weather-temp">${Math.round(maxs[i])}° / ${Math.round(mins[i])}°</div><div class="weather-rain">降雨 ${rains[i] ?? 0}%</div>`;
      daysEl.appendChild(card);
    });
    if (noteEl) noteEl.textContent = `目前顯示${city.name}近 7 日預報。2026/10 旅遊日的正式預報，接近出發前再打開網頁就會自動更新。`;
  } catch (err) {
    console.error(err);
    updated.textContent = `${city.name}天氣讀取失敗`;
    nowTemp.textContent = '--°';
    nowDesc.textContent = '請確認網路後重新整理';
    if (noteEl) noteEl.textContent = '天氣來源暫時無法連線；行程功能仍可正常使用。';
  }
}
function selectWeatherCity(cityKey, btn) {
  setWeatherCityButtons(cityKey);
  loadWeather(cityKey);
}


loadLocalData();
render();
loadWeather('osaka');
initCloudSync();
